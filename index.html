<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Love App - Premium Nashr</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Yuklanish Ekran (Preloader) -->
    <div id="preloader">
        <div class="preloader-heart">
            <div></div>
        </div>
        <p class="loading-text">Sehrli lahzalar tayyorlanmoqda...</p>
    </div>

    <!-- Orqa Fon Elementlari -->
    <div class="animated-bg"></div>
    <div class="particle-container" id="particleContainer"></div>
    <div class="cursor-trail" id="cursorTrail"></div>

    <!-- Musiqa Pleyeri -->
    <div class="music-control">
        <button id="muteBtn" class="mute-btn" aria-label="Musiqani yoqish/o'chirish">
            <svg id="musicOnIcon" viewBox="0 0 24 24" width="24" height="24">
                <path fill="currentColor" d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" />
            </svg>
            <svg id="musicMutedIcon" viewBox="0 0 24 24" width="24" height="24" class="hidden">
                <path fill="currentColor" d="M12,4L7,9H3V15H7L12,20V4M16.5,12A4.5,4.5 0 0,0 14,7.97V10.18L16.45,12.63C16.48,12.42 16.5,12.21 16.5,12M19,12C19,13.17 18.72,14.28 18.24,15.27L19.78,16.81C20.56,15.39 21,13.75 21,12C21,7.72 18.01,4.14 14,3.23V5.29C16.89,6.15 19,8.83 19,12M4.27,3L3,4.27L7.73,9H3V15H7L12,20V13.27L16.25,17.53C15.58,18.04 14.83,18.44 14,18.71V20.77C15.38,20.44 16.63,19.79 17.67,18.94L20.73,22L22,20.73L4.27,3Z" />
            </svg>
        </button>
        <audio id="bgMusic" loop preload="auto">
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- Bildirishnomalar (Toast) Konteyneri -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Asosiy Karta (Card) -->
    <main class="app-card" id="appCard">
        
        <!-- Savol-javob bo'limi -->
        <div id="quizSection">
            <!-- Progress Bar va hisoblagich -->
            <div class="quiz-header">
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="counter-display" id="counterDisplay">1-savol, jami 30 ta</div>
            </div>

            <!-- Savol matni va emoji -->
            <div class="quiz-body">
                <div class="emoji-wrapper" id="emojiWrapper">❤️</div>
                <h2 class="question-text" id="questionText"></h2>
            </div>

            <!-- Tugmalar -->
            <div class="quiz-footer" id="quizFooter">
                <button class="btn btn-yes" id="yesBtn">
                    <span>HA!</span>
                    <div class="btn-glow"></div>
                </button>
                <button class="btn btn-no" id="noBtn">
                    <span>YO'Q</span>
                </button>
            </div>
        </div>

        <!-- Yakuniy g'alaba ekrani -->
        <div id="finalSection" class="hidden">
            <div class="final-container">
                <div class="huge-heart-wrapper">
                    <div class="huge-heart">❤️</div>
                    <div class="heart-pulse-glow"></div>
                </div>
                <h1 class="final-title">Meni sevishingizni bilardim! ❤️</h1>
                <p class="final-subtitle">Yuragim abadiy sizniki va shunday bo'lib qoladi.</p>
                <button class="btn btn-yes" id="playAgainBtn">
                    <span>Yana o'ynash</span>
                    <div class="btn-glow"></div>
                </button>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
